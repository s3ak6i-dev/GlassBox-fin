# Alembic configuration for the glassbox backend.
# The database URL is supplied at runtime from app.backend.config.settings
# (which reads app/backend/.env), so it is intentionally left blank here.
[alembic]
script_location = app/backend/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in migrations/env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
